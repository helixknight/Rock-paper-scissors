{% extends "base.html" %}

{% block content %}
<h2>The Battle Begins! ⚔️</h2>
<p style="font-size: 48px;">You: {{ emoji[user] }} vs Computer: {{ emoji[computer] }}</p>

<div id="cinematic" class="emoji" style="font-size:32px; margin:30px 0;"></div>

<!-- Play Again button, outside of script -->
<a href="{{ url_for('user_choice') }}" 
   style="display:block; margin-top:30px; font-size:24px; text-decoration:none; color:white; background:#4CAF50; padding:10px 20px; border-radius:8px;">
   Play Again 🔄
</a>

<script>
const messages = ["Rock... 🪨", "Paper... 📄", "Scissors... ✂️", "FIGHT! ⚡"];
const cinematic = document.getElementById('cinematic');
const memeUrl = "{{ meme | default('') }}";

let i = 0;
function showNext() {
    if (i < messages.length) {
        cinematic.textContent = messages[i];
        i++;
        setTimeout(showNext, 500);
    } else {
        let resultHTML = "Result: {{ result }} 🎉";
        if (memeUrl) {
            resultHTML += "<br><img src='" + memeUrl + "' style='max-width:300px; margin-top:20px;' />";
        }
        cinematic.innerHTML = resultHTML;
    }
}
showNext();
</script>
{% endblock %}
